<!--
  Paste into Supabase Dashboard → Authentication → Email templates → "Confirm signup"
  (first-time signup / "Confirm your signup" style emails).

  If you instead receive "Your Magic Link" / "Magic Link" emails, edit the MAGIC LINK template:
  see apps/admin-web/supabase/magic-link-email-otp.html

  Important (from Supabase docs):
  - If {{ .ConfirmationURL }} appears in this template, Supabase sends a MAGIC LINK email (no numeric OTP).
  - For Bubbler admin /signup OTP, use ONLY {{ .Token }} below — do not include {{ .ConfirmationURL }}. (Token length is controlled by Supabase, often 6 or 8 digits.)

  After saving, use "Send verification code" again on /signup to test.
-->
<h2>Confirm your signup</h2>
<p>Enter this one-time code in Bubbler Admin (valid for a limited time):</p>
<p style="font-size: 28px; font-weight: 700; letter-spacing: 0.2em; margin: 16px 0">{{ .Token }}</p>
<p>If you did not request this, you can ignore this email.</p>
