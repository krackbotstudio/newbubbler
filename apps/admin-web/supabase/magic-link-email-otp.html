<!--
  Paste into Supabase Dashboard → Authentication → Email templates → "Magic link"
  (emails with subject like "Your Magic Link" / "Magic Link" use THIS template).

  Same rule as Confirm signup:
  - If {{ .ConfirmationURL }} is in the body, users get a CLICK LINK email only.
  - For a numeric OTP with signInWithOtp, use {{ .Token }} and REMOVE {{ .ConfirmationURL }} (length is set by Supabase, often 6 or 8 digits).

  After saving, request a new code from /signup.
-->
<h2>Your sign-in code</h2>
<p>Enter this one-time code in Bubbler Admin:</p>
<p style="font-size: 28px; font-weight: 700; letter-spacing: 0.2em; margin: 16px 0">{{ .Token }}</p>
<p>If you did not request this, you can ignore this email.</p>
